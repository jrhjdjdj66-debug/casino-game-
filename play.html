<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASINO 10</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        body {
            background: #0a0a1a;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            padding: 20px;
            min-height: 100vh;
            background-image: radial-gradient(circle at 20% 50%, #1a0a2e 0%, #0a0a1a 70%);
        }
        
        /* ГЛАВНЫЙ ХЕДЕР */
        .header {
            text-align: center;
            padding: 30px 0;
            position: relative;
        }
        .header h1 {
            font-size: 42px;
            background: linear-gradient(45deg, #f1c40f, #e94560, #f1c40f);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s infinite;
            letter-spacing: 4px;
            text-shadow: 0 0 40px rgba(233, 69, 96, 0.3);
        }
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .balance {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 18px 30px;
            border-radius: 16px;
            display: inline-block;
            margin: 10px auto;
            font-size: 22px;
            letter-spacing: 2px;
            box-shadow: 0 0 40px rgba(241, 196, 15, 0.1);
        }
        .balance span {
            color: #f1c40f;
            font-weight: 900;
        }
        
        /* СЕТКА ИГР */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 30px 0;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .game-btn {
            background: linear-gradient(145deg, #1a1a3e, #0f0f2a);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .game-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(241,196,15,0.1), transparent, rgba(233,69,96,0.1), transparent);
            animation: rotateBorder 6s linear infinite;
        }
        @keyframes rotateBorder {
            100% { transform: rotate(360deg); }
        }
        .game-btn:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #f1c40f;
            box-shadow: 0 20px 60px rgba(241, 196, 15, 0.2);
        }
        .game-btn:active {
            transform: scale(0.95);
        }
        .game-btn .icon {
            font-size: 40px;
            display: block;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .game-btn .name {
            font-size: 11px;
            opacity: 0.7;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
            text-transform: uppercase;
        }
        .game-btn .glow {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle at 50% 0%, rgba(241,196,15,0.1), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .game-btn:hover .glow {
            opacity: 1;
        }
        
        /* ИГРОВАЯ ОБЛАСТЬ */
        #gameArea {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 30px 20px;
            margin-top: 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            min-height: 250px;
            transition: all 0.5s;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.5);
        }
        
        .bet-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin: 15px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        .bet-row input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            width: 120px;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            transition: all 0.3s;
        }
        .bet-row input:focus {
            border-color: #f1c40f;
            outline: none;
            box-shadow: 0 0 30px rgba(241,196,15,0.1);
        }
        .bet-row button {
            background: linear-gradient(45deg, #e94560, #c0392b);
            border: none;
            padding: 14px 35px;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
        }
        .bet-row button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(233, 69, 96, 0.5);
        }
        .bet-row button:active {
            transform: scale(0.95);
        }
        
        .result {
            font-size: 24px;
            text-align: center;
            padding: 20px;
            margin: 15px 0;
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            animation: resultPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes resultPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* КАНВАС ДЛЯ РУЛЕТКИ */
        canvas {
            display: block;
            margin: 20px auto;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(241,196,15,0.1);
            background: #0a0a1a;
            max-width: 100%;
            animation: pulseGlow 2s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 40px rgba(241,196,15,0.05); }
            50% { box-shadow: 0 0 80px rgba(241,196,15,0.15); }
        }
        
        /* АДАПТИВ */
        @media (max-width: 480px) {
            .header h1 { font-size: 28px; }
            .balance { font-size: 16px; padding: 12px 20px; }
            .game-grid { gap: 10px; }
            .game-btn { padding: 18px 10px; }
            .game-btn .icon { font-size: 30px; }
            .game-btn .name { font-size: 9px; }
            .bet-row input { width: 80px; font-size: 14px; padding: 10px; }
            .bet-row button { padding: 10px 20px; font-size: 14px; }
            .result { font-size: 18px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎰 CASINO 10</h1>
    <div class="balance">💰 <span id="balanceVal">1000</span> монет</div>
</div>

<div class="game-grid">
    <div class="game-btn" onclick="startGame('roulette')">
        <div class="glow"></div>
        <span class="icon">🎡</span>
        <span class="name">Рулетка</span>
    </div>
    <div class="game-btn" onclick="startGame('slots')">
        <div class="glow"></div>
        <span class="icon">🎰</span>
        <span class="name">Слоты</span>
    </div>
    <div class="game-btn" onclick="startGame('dice')">
        <div class="glow"></div>
        <span class="icon">🎲</span>
        <span class="name">Кости</span>
    </div>
    <div class="game-btn" onclick="startGame('coin')">
        <div class="glow"></div>
        <span class="icon">🪙</span>
        <span class="name">Орёл/Решка</span>
    </div>
    <div class="game-btn" onclick="startGame('blackjack')">
        <div class="glow"></div>
        <span class="icon">🃏</span>
        <span class="name">Блэкджек</span>
    </div>
    <div class="game-btn" onclick="startGame('keno')">
        <div class="glow"></div>
        <span class="icon">🎯</span>
        <span class="name">Кено</span>
    </div>
    <div class="game-btn" onclick="startGame('poker')">
        <div class="glow"></div>
        <span class="icon">♠️</span>
        <span class="name">Покер</span>
    </div>
    <div class="game-btn" onclick="startGame('wheel')">
        <div class="glow"></div>
        <span class="icon">🎡</span>
        <span class="name">Колесо</span>
    </div>
    <div class="game-btn" onclick="startGame('bulls')">
        <div class="glow"></div>
        <span class="icon">🐂</span>
        <span class="name">Быки/Коровы</span>
    </div>
    <div class="game-btn" onclick="startGame('crypto')">
        <div class="glow"></div>
        <span class="icon">📈</span>
        <span class="name">Крипто</span>
    </div>
</div>

<div id="gameArea">
    <p style="text-align:center;opacity:0.4;font-size:14px;letter-spacing:2px;">⬆️ ВЫБЕРИ ИГРУ ⬆️</p>
</div>

<script>
    let balance = 1000;
    const tg = window.Telegram.WebApp;
    tg.expand();

    function updateBalance() {
        document.getElementById('balanceVal').textContent = balance;
        // Отправляем данные в бота
        tg.sendData(JSON.stringify({ balance }));
    }

    function placeBet(minBet = 10) {
        const input = document.getElementById('betInput');
        if (!input) return null;
        const bet = parseInt(input.value);
        if (isNaN(bet) || bet < minBet || bet > balance) {
            alert(`❗ Ставка от ${minBet} до ${balance} монет`);
            return null;
        }
        balance -= bet;
        updateBalance();
        return bet;
    }

    function showResult(text, isWin) {
        const el = document.getElementById('gameResult');
        if (el) {
            el.innerHTML = text;
            el.style.color = isWin ? '#4caf50' : '#ff4757';
            el.style.animation = 'none';
            setTimeout(() => el.style.animation = 'resultPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)', 10);
        }
    }

    function startGame(game) {
        const area = document.getElementById('gameArea');
        area.innerHTML = `
            <h3 style="text-align:center;font-size:20px;letter-spacing:2px;margin-bottom:15px;">${game.toUpperCase()}</h3>
            <div class="bet-row">
                <input id="betInput" type="number" value="10" min="1">
                <button onclick="play_${game}()">▶ ИГРАТЬ</button>
            </div>
            <div id="gameResult" class="result" style="color:#aaa;">⬇️ СДЕЛАЙ СТАВКУ ⬇️</div>
            <div id="gameCanvas"></div>
        `;
        if (game === 'roulette') setTimeout(drawRoulette, 100);
        if (game === 'slots') setTimeout(drawSlots, 100);
        if (game === 'dice') setTimeout(drawDice, 100);
        if (game === 'wheel') setTimeout(drawWheel, 100);
    }

    // ========== РУЛЕТКА С АНИМАЦИЕЙ ==========
    let rouletteAngle = 0, spinning = false;

    function drawRoulette(angle = 0) {
        const container = document.getElementById('gameCanvas');
        if (!container) return;
        container.innerHTML = '';
        const canvas = document.createElement('canvas');
        canvas.width = 320;
        canvas.height = 320;
        container.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        const cx = 160, cy = 160, radius = 140;

        const numbers = Array.from({length: 37}, (_, i) => i);
        const colors = numbers.map(n => n === 0 ? '#2ecc71' : (n % 2 === 0 ? '#1a1a3e' : '#e74c3c'));
        const segAngle = (Math.PI * 2) / 37;

        ctx.clearRect(0, 0, 320, 320);
        
        for (let i = 0; i < 37; i++) {
            const start = angle + i * segAngle;
            const end = start + segAngle;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, radius, start, end);
            ctx.closePath();
            ctx.fillStyle = colors[i];
            ctx.fill();
            ctx.shadowColor = 'rgba(241,196,15,0.1)';
            ctx.shadowBlur = 10;
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(start + segAngle/2);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#fff';
            ctx.font = '11px Orbitron, sans-serif';
            ctx.shadowBlur = 0;
            ctx.fillText(numbers[i], radius * 0.72, 0);
            ctx.restore();
        }

        // Центр с анимацией
        const glow = Date.now() / 1000;
        const pulse = 1 + Math.sin(glow * 2) * 0.05;
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(cx, cy, 22 * pulse, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 22);
        grad.addColorStop(0, '#f1c40f');
        grad.addColorStop(1, '#e67e22');
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.shadowColor = 'rgba(241,196,15,0.5)';
        ctx.shadowBlur = 30;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Стрелка
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.moveTo(cx - 14, 8);
        ctx.lineTo(cx + 14, 8);
        ctx.lineTo(cx, -4);
        ctx.closePath();
        ctx.fillStyle = '#ff6b6b';
        ctx.fill();
        ctx.shadowColor = 'rgba(255,107,107,0.5)';
        ctx.shadowBlur = 20;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    window.play_roulette = function() {
        if (spinning) return;
        spinning = true;
        const bet = placeBet(10);
        if (!bet) { spinning = false; return; }

        const target = Math.floor(Math.random() * 37);
        const targetAngle = (target / 37) * Math.PI * 2;
        const spins = 5 + Math.random() * 3;
        const totalRotation = spins * Math.PI * 2 + (Math.PI * 2 - targetAngle);
        const startAngle = rouletteAngle;
        const duration = 3000 + Math.random() * 1000;
        const startTime = Date.now();

        function animate() {
            const elapsed = Date.now() - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            const currentAngle = startAngle + totalRotation * eased;
            rouletteAngle = currentAngle;
            drawRoulette(currentAngle);

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                const color = target === 0 ? 'зелёный' : (target % 2 === 0 ? 'чёрный' : 'красный');
                const win = (target === 7) ? bet * 10 : (target % 2 === 0 ? bet * 1.5 : 0);
                balance += win;
                updateBalance();
                showResult(`🎡 ВЫПАЛО: ${target} (${color})  ${win > 0 ? '✅ +' + win : '❌ ПРОИГРЫШ'}`, win > 0);
                spinning = false;
            }
        }
        animate();
    };

    // ========== СЛОТЫ С АНИМАЦИЕЙ ==========
    let slotInterval = null;

    function drawSlots(reels = ['🍒','🍒','🍒']) {
        const container = document.getElementById('gameCanvas');
        if (!container) return;
        container.innerHTML = `
            <div style="display:flex;justify-content:center;gap:20px;font-size:60px;padding:30px;background:rgba(0,0,0,0.3);border-radius:16px;border:1px solid rgba(255,255,255,0.05);">
                <span style="animation:float 1.5s ease-in-out infinite;">${reels[0]}</span>
                <span style="animation:float 1.5s ease-in-out infinite 0.3s;">${reels[1]}</span>
                <span style="animation:float 1.5s ease-in-out infinite 0.6s;">${reels[2]}</span>
            </div>
        `;
    }

    window.play_slots = function() {
        const bet = placeBet(10);
        if (!bet) return;

        const emojis = ['🍒','🍋','🍊','🍇','🔔','💎'];
        let count = 0;
        const maxCount = 15 + Math.floor(Math.random() * 10);

        if (slotInterval) clearInterval(slotInterval);
        slotInterval = setInterval(() => {
            const r = [
                emojis[Math.floor(Math.random() * 6)],
                emojis[Math.floor(Math.random() * 6)],
                emojis[Math.floor(Math.random() * 6)]
            ];
            drawSlots(r);
            count++;
            if (count >= maxCount) {
                clearInterval(slotInterval);
                slotInterval = null;
                const final = [
                    emojis[Math.floor(Math.random() * 6)],
                    emojis[Math.floor(Math.random() * 6)],
                    emojis[Math.floor(Math.random() * 6)]
                ];
                drawSlots(final);
                const win = (final[0] === final[1] && final[1] === final[2]) ? bet * 5 : 
                           (final[0] === final[1] || final[1] === final[2] || final[0] === final[2]) ? bet * 1.5 : 0;
                balance += win;
                updateBalance();
                showResult(`🎰 ${final.join(' ')}  ${win > 0 ? '✅ +' + win : '❌ ПРОИГРЫШ'}`, win > 0);
            }
        }, 100);
    };

    // ========== КОСТИ С АНИМАЦИЕЙ ==========
    function drawDice(d1 = 1, d2 = 1, rolling = false) {
        const container = document.getElementById('gameCanvas');
        if (!container) return;
        container.innerHTML = `
            <div style="display:flex;justify-content:center;gap:30px;padding:30px;">
                <div style="font-size:80px;animation:${rolling ? 'roll 0.15s infinite' : 'float 2s ease-in-out infinite'};">🎲</div>
                <div style="font-size:80px;animation:${rolling ? 'roll 0.15s infinite 0.07s' : 'float 2s ease-in-out infinite 0.3s'};">🎲</div>
            </div>
            <div style="text-align:center;font-size:32px;font-weight:900;color:#f1c40f;">
                ${d1} + ${d2} = ${d1 + d2}
            </div>
        `;
    }
    @keyframes roll {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.2); }
        100% { transform: rotate(360deg) scale(1); }
    }

    window.play_dice = function() {
        const bet = placeBet(10);
        if (!bet) return;

        drawDice(1, 1, true);
        setTimeout(() => {
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            const sum = d1 + d2;
            const win = (sum >= 8) ? bet * 2 : 0;
            balance += win;
            updateBalance();
            drawDice(d1, d2, false);
            showResult(`🎲 ${d1}+${d2}=${sum}  ${win > 0 ? '✅ +' + win : '❌ ПРОИГРЫШ'}`, win > 0);
        }, 1500);
    };

    // ========== ОРЁЛ/РЕШКА ==========
    window.play_coin = function() {
        const bet = placeBet(10);
        if (!bet) return;

        const container = document.getElementById('gameCanvas');
        if (!container) return;
        container.innerHTML = `
            <div style="text-align:center;font-size:100px;animation:spin 1s ease-in-out;padding:30px;">🪙</div>
        `;
        setTimeout(() => {
            const side = Math.random() < 0.5 ? 'ОРЁЛ' : 'РЕШКА';
            const emoji = side === 'ОРЁЛ' ? '🦅' : '🪙';
            const win = (side === 'ОРЁЛ') ? bet * 1.8 : 0;
            balance += win;
            updateBalance();
            container.innerHTML = `
                <div style="text-align:center;font-size:60px;padding:20px;">${emoji}</div>
                <div style="text-align:center;font-size:28px;font-weight:900;color:#f1c40f;">${side}</div>
            `;
            showResult(`🪙 ${side}  ${win > 0 ? '✅ +' + Math.round(win) : '❌ ПРОИГРЫШ'}`, win > 0);
        }, 1000);
    };
    @keyframes spin {
        0% { transform: rotateY(0deg) scale(1); }
        50% { transform: rotateY(720deg) scale(1.3); }
        100% { transform: rotateY(1440deg) scale(1); }
    }

    // ========== БЛЭКДЖЕК ==========
    window.play_blackjack = function() {
        const bet = placeBet(10);
        if (!bet) return;

        const container = document.getElementById('gameCanvas');
        if (!container) return;
        
        const player = Math.floor(Math.random() * 10) + 12;
        const dealer = Math.floor(Math.random() * 10) + 12;
        
        let win = 0;
        let msg = '';
        if (player > 21) {
            msg = '❌ ПЕРЕБОР';
        } else if (dealer > 21 || player > dealer) {
            win = bet * 1.5;
            msg = '✅ ПОБЕДА!';
        } else if (player === dealer) {
            win = bet;
            msg = '🤝 НИЧЬЯ';
        } else {
            msg = '❌ ПРОИГРЫШ';
        }
        balance += win;
        updateBalance();

        container.innerHTML = `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:20px;">
                <div style="text-align:center;background:rgba(0,0,0,0.3);padding:15px;border-radius:12px;">
                    <div style="font-size:14px;opacity:0.6;">ДИЛЕР</div>
                    <div style="font-size:40px;">🃏</div>
                    <div style="font-size:24px;font-weight:900;">${dealer}</div>
                </div>
                <div style="text-align:center;background:rgba(0,0,0,0.3);padding:15px;border-radius:12px;">
                    <div style="font-size:14px;opacity:0.6;">ВЫ</div>
                    <div style="font-size:40px;">🃏</div>
                    <div style="font-size:24px;font-weight:900;">${player}</div>
                </div>
            </div>
            <div style="text-align:center;font-size:22px;font-weight:900;color:${win > 0 ? '#4caf50' : '#ff4757'};">${msg}</div>
        `;
        showResult(`🃏 ВЫ: ${player} | ДИЛЕР: ${dealer}  ${win > 0 ? '✅ +' + win : '❌ ПРОИГРЫШ'}`, win > 0);
    };

    // ========== КЕНО ==========
    window.play_keno = function() {
        const bet = placeBet(10);
        if (!bet) return;

        const container = document.getElementById('gameCanvas');

        const sectors = ['x0','x1','x2','x3','x5','x10'];

            const val = parseInt(rand.replace('x','')) || 0;
            container.innerHTML = `
                <div style="text-align:center;padding:20px;">

                    </div>
                </div>
            `;
            count++;
            if (count > 15 + Math.floor(Math.random() * 10)) {
                clearInterval(interval);
                const final = sectors[Math.floor(Math.random() * 6)];

                const win = bet * multiplier;
                balance += win;
                updateBalance();

                        </div>
                    </div>
                `;
                showResult(`🎡 ${multiplier === 0 ? '💀 ПРОИГРЫШ' : '✅ +' + win}`, win > 0);
            }
        }, 150);
    };
