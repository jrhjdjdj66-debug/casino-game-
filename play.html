<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Logger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            color: #fff;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { color: #f1c40f; margin-bottom: 20px; }
        .ip-box {
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 24px;
            font-weight: bold;
            color: #4caf50;
            border: 1px solid rgba(76,175,80,0.3);
        }
        .info {
            color: #aaa;
            font-size: 14px;
            margin: 10px 0;
        }
        .status {
            color: #4caf50;
            margin: 15px 0;
            font-size: 14px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f1c40f;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .footer {
            margin-top: 30px;
            color: #555;
            font-size: 12px;
        }
        .log-btn {
            background: #e94560;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        .log-btn:hover { background: #c0392b; }
        #logList {
            margin-top: 20px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 10px;
            display: none;
        }
        #logList div {
            padding: 5px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
            color: #aaa;
        }
        #logList .time { color: #f1c40f; }
        #logList .ip { color: #4caf50; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌐 IP ЛОГГЕР</h1>
    <div class="ip-box" id="ipDisplay">
        <div class="loading"></div>
    </div>
    <div class="status" id="status">🟢 Отслеживание включено</div>
    <p class="info">Ваш IP-адрес сохранён в логе</p>
    <button class="log-btn" onclick="viewLogs()">📋 Показать логи</button>
    <div id="logList"></div>
    <div class="footer">🔒 Логи хранятся локально</div>
</div>

<script>
    // ===== ОСНОВНАЯ ФУНКЦИЯ: ПОЛУЧИТЬ IP =====
    function getIP() {
        const ipDisplay = document.getElementById('ipDisplay');
        
        // Пытаемся получить IP через API
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                const ip = data.ip;
                ipDisplay.innerHTML = '🔍 ' + ip;
                ipDisplay.style.color = '#4caf50';
                saveLog(ip);
            })
            .catch(() => {
                // Резервный вариант - через другой API
                fetch('https://ipapi.co/json/')
                    .then(response => response.json())
                    .then(data => {
                        const ip = data.ip;
                        ipDisplay.innerHTML = '🔍 ' + ip;
                        ipDisplay.style.color = '#4caf50';
                        saveLog(ip);
                    })
                    .catch(() => {
                        ipDisplay.innerHTML = '❌ Не удалось определить IP';
                        ipDisplay.style.color = '#ff4757';
                    });
            });
    }

    // ===== СОХРАНЕНИЕ В ЛОКЕЛЬНОЕ ХРАНИЛИЩЕ =====
    function saveLog(ip) {
        const logs = JSON.parse(localStorage.getItem('ipLogs') || '[]');
        const now = new Date();
        const time = now.toLocaleString('ru-RU', { 
            day: '2-digit', 
            month: '2-digit', 
            year: 'numeric', 
            hour: '2-digit', 
            minute: '2-digit', 
            second: '2-digit' 
        });
        
        // Получаем User-Agent
        const ua = navigator.userAgent || 'Неизвестно';
        
        // Определяем устройство
        let device = 'Неизвестно';
        if (ua.includes('Mobile')) device = '📱 Мобильный';
        else if (ua.includes('Tablet')) device = '📱 Планшет';
        else device = '💻 Компьютер';
        
        logs.push({
            ip: ip,
            time: time,
            device: device,
            ua: ua
        });
        
        localStorage.setItem('ipLogs', JSON.stringify(logs));
        updateStatus(logs.length);
    }

    // ===== ОБНОВЛЕНИЕ СТАТУСА =====
    function updateStatus(count) {
        const status = document.getElementById('status');
        status.innerHTML = '🟢 Зафиксировано посещений: <strong>' + count + '</strong>';
    }

    // ===== ПОКАЗАТЬ ЛОГИ =====
    function viewLogs() {
        const logList = document.getElementById('logList');
        const logs = JSON.parse(localStorage.getItem('ipLogs') || '[]');
        
        if (logs.length === 0) {
            logList.style.display = 'block';
            logList.innerHTML = '<div style="text-align:center;color:#555;padding:20px;">Пока нет логов</div>';
            return;
        }
        
        logList.style.display = 'block';
        logList.innerHTML = logs.map(log => 
            '<div><span class="time">' + log.time + '</span> — <span class="ip">' + log.ip + '</span> ' + log.device + '</div>'
        ).reverse().join('');
    }

    // ===== ЗАПУСК =====
    getIP();
    
    // Показываем количество логов при загрузке
    const logs = JSON.parse(localStorage.getItem('ipLogs') || '[]');
    updateStatus(logs.length);
</script>
</body>
</html>
